trigger:
  - main

pr:
  - main

pool:
  vmImage: "ubuntu-latest"

variables:
  name: "NetWebExample"
  rootFolder: "Examples/"
  ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
    isMain: "true"
  ${{ else }}:
    isMain: "false"
  buildPlatform: "Any CPU"
  buildConfiguration: "Release"
  artifactName: "NetWebExample"

resources:
  repositories:
    - repository: AdoCommonTools
      name: Software/AdoCommonTools
      type: git
      ref: main

stages:
  - stage: BuildAndTest
    jobs:
      - template: Pipelines/netBuildAndTest.yml@AdoCommonTools
        parameters:
          buildConfiguration: ${{ variables.buildConfiguration }}
          rootFolder: ${{ variables.rootFolder }}
          artifactName: ${{ variables.name }}
          netVersion: "10.x"
          isMain: ${{ variables.isMain }}

  - stage: PublishDevelopmentSQL
    condition: and(succeeded(), eq(variables.isMain, 'true'))
    dependsOn: BuildAndTest
    jobs:
      - deployment: "Deploy_Dev_SQL"
        displayName: "Deploy Dev SQL"
        environment:
          name: "Environment-Development-Database"
          resourceName: "ADOResource"
          resourceType: VirtualMachine
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                - download: current
                  artifact: "${{ variables.artifactName }}_SQL"
                - template: Pipelines/dbUp.yml
                  parameters:
                    databaseServer: $(DatabaseServer)
                    databaseName: $(DbUpDatabaseName)
                    scriptsToUpdatePath: "$(Agent.BuildDirectory)\\${{ variables.artifactName }}_SQL"
                    environment: "Development"
                    publishSingleFile: "false"

  - stage: PublishDevelopment
    condition: and(succeeded(), eq(variables.isMain, true))
    dependsOn: BuildAndTest
    jobs:
      # will create the app pool or website in IIS
      - template: Pipelines/IISPublishWithCreate.yml@AdoCommonTools
        parameters:
          artifactName: "${{ variables.artifactName }}_Dev"
          # I couldn't use the variable group here, so I hard coded the environment name
          environment: "Development-IIS-OnPremise"
          iisAppPoolName: "${{ variables.name }}_AppPool"
          iisWebSiteName: ${{ variables.name }}
          iisTargetFolder: 'E:\Applications\${{ variables.name }}'
          dotNetType: "Net"
          # set in variables for the pipeline in ADO
          iisIpAddress: $(ipAddressDev)
          iisPort: $(ipPortDev)
          # there may be different cert thumbnails for each site, don't put directly here, but use a secret variable in the group
          # could be $(IisCertThumbnail-ProductXYZ)
          iisCertThumbnail: ""
          siteUrl: "https://aligneddev.net" # your site url here
          runSanityCheck: true
          runHealthCheck: true
          isMain: ${{ variables.isMain }}

  - template: Pipelines/CancelWaitingForApprovalMainDeployments.yml@AdoCommonTools
    parameters:
      isMain: ${{ variables.isMain }}

  - stage: PublishProductionSQL
    # is lockBehavior: runLatest needed after adding CancelWaitingForApprovalMainDeployments.yml?
    # Not for the specific problem you were solving. The new cancel stage in netiis-example.yml:93 is what handles older main runs that are stuck before production approval. lockBehavior: runLatest at netiis-example.yml:99 and netiis-example.yml:122 does not fix that approval-pending case.

    # I would still keep it. It gives you a second layer of protection once runs actually reach the production stage and compete for the same protected target. That still matters for cases like:

    # A manual rerun or manually queued run that starts after the cancel stage has already executed.
    # Two runs reaching the production environment close together due to timing or retries.
    # Future pipeline changes where another path reaches production without going through the cancel stage.
    # So the practical answer is: not strictly needed anymore, but still useful as defense in depth
    lockBehavior: runLatest
    condition: and(succeeded(), eq(variables.isMain, 'true'))
    dependsOn: CancelWaitingForApprovalMainDeployments
    jobs:
      - deployment: "Deploy_Prod_SQL"
        displayName: "Deploy Prod SQL"
        workspace: 
          clean: all
        environment:
          name: "Environment-Production-Database"
          resourceName: "ADOResource"
          resourceType: VirtualMachine
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                - download: current
                  artifact: "${{ variables.artifactName }}_SQL"
                - template: Pipelines/dbUp.yml
                  parameters:
                    databaseServer: $(DatabaseServer)
                    databaseName: $(DbUpDatabaseName)
                    scriptsToUpdatePath: "$(Agent.BuildDirectory)\\${{ variables.artifactName }}_SQL"
                    environment: "Production"
  - stage: PublishProduction
    lockBehavior: runLatest
    condition: and(succeeded(), eq(variables.isMain, true))
    dependsOn: PublishProductionSQL
    jobs:
      - template: Pipelines/IISPublish.yml@AdoCommonTools
        parameters:
          artifactName: '${{ variables.artifactName }}_Prod'
          environment: 'Production-IIS-OnPremise'
          iisAppPoolName: '${{ variables.name }}_Prod_AppPool'
          iisWebSiteName: '${{ variables.name }}_Prod'
          iisTargetFolder: 'E:\Applications\${{ variables.name }}'
          dotNetType: 'Net'
          runSanityCheck: true
          runHealthCheck: true
          isMain: ${{ variables.isMain }}

