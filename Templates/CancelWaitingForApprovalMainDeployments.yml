# Cancel older in-progress Deployment for the same pipeline and branch before production approval.

# lockBehavior:runLatest tells Azure DevOps to keep only the newest run when multiple Deployment compete for the same protected deployment target, canceling older ones.
# The docs explain the mismatch: checks run in category order, and Exclusive lock Deployment after approvals. That means an older run can sit at manual approval without ever being canceled by runLatest, because it has not yet reached the lock decision point.
# This only applies when Deployment are actively competing for a protected deployment target. When Deployment have approval pending, they haven't reached the deployment target yet, so the lock behavior doesn't kick in.
# See [Microsoft documentation](https://learn.microsoft.com/en-us/azure/devops/pipelines/process/deployment-jobs?view=azure-devops#protect-deployment-targets) for more on protected deployment targets and lock behaviors.

# The Build Service needs to have Stop Builds changed to allow in the Pipeline security permissions: https://beta.stackoverflow.com/questions/62044055/is-it-possible-to-cancel-a-azure-devops-pipeline-job-programmatically
parameters:
  - name: isMain
    type: boolean
    default: false
    
steps:
- task: PowerShell@2
  displayName: Cancel older main deployments waiting for approval
  condition: and(succeeded(), ${{ eq (parameters.isMain, true) }} )
  continueOnError: true
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  inputs:
    targetType: inline
    script: |
      if ([string]::IsNullOrWhiteSpace($env:SYSTEM_ACCESSTOKEN)) {
        throw "System.AccessToken is empty. Enable 'Allow scripts to access the OAuth token' for this pipeline."
      }

      $headers = @{
        Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN"
        "Content-Type" = "application/json"
      }

      $definitionId = "$(System.DefinitionId)"
      $currentBuildId = [int]"$(Build.BuildId)"
      $sourceBranch = "$(Build.SourceBranch)"
      $baseUri = "$(System.CollectionUri)$(System.TeamProject)"
      #$queryUri = "{0}?definitions={1}&branchName={2}&statusFilter=inProgress&queryOrder=queueTimeDescending&api-version=7.1" -f $baseUri, $definitionId, [uri]::EscapeDataString($sourceBranch)
      #Write-Host $queryUri
      #$response = Invoke-RestMethod -Uri $queryUri -Method Get -Headers $headers

      $approvalsUri = "$baseUri/_apis/pipelines/approvals?state=pending&api-version=7.1"
      Write-Host $approvalsUri
      $approvalsResponse = Invoke-RestMethod -Uri $approvalsUri -Method Get -Headers $headers

      $buildsToCancel = New-Object 'System.Collections.Generic.HashSet[object]'
      foreach ($approval in $approvalsresponse.value) {
          if ($null -ne $approval.pipeline -and $null -ne $approval.pipeline.owner -and $approval.pipeline.owner.id -match '^[0-9]+$') {
              if($approval.pipeline.id -eq $definitionId) {
                write-host "match - Id:", $approval.pipeline.id, "pipelineId:", $approval.pipeline.owner.id
                [void]$buildsToCancel.add($approval)
              }
          }
      }

      Write-Host "Builds To Cancel: {0}", $buildsToCancel.Count

      if ($buildsToCancel.Count -eq 0) {
          Write-Host "No older main deployments found that are waiting for approval."
          return
      }

      foreach ($approval in $buildsToCancel) {
          $cancelUri = "{0}/_apis/build/builds/{1}?api-version=7.1" -f $baseUri, $approval.pipeline.owner.id
          $body = @{ status = "cancelling" } | ConvertTo-Json
          Write-Host $cancelUri
          Write-Host $body
          Invoke-RestMethod -Uri $cancelUri -Method Patch -Headers $headers -Body $body | Out-Null
      }